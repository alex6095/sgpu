# Namespace is intentionally omitted so the same manifest deploys to any
# node. ALWAYS pass it explicitly: kubectl apply -n <p-sgvr-node-01|-02> -f
# (a bare apply would target your current kubectl context's namespace).
apiVersion: v1
kind: Service
metadata:
  name: sangmin-gpu-monitor
spec:
  selector:
    app: sangmin-gpu-monitor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: sangmin-gpu-monitor
  labels:
    app: sangmin-gpu-monitor
    owner: sangmin
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  restartPolicy: Always
  priorityClassName: private-zone
  hostPID: true
  nodeSelector:
    mlx.navercorp.com/zone: private-h200-sgvr-0
  volumes:
    # Usage-stats storage lives on the lab's shared persistent volume
    # (pv-01), under this user's own subdirectory. subPath keeps the
    # privileged pod scoped to its own stats dir, not the whole 24 TB
    # volume. pv-01 is a node-local (local-path) PV, so its nodeAffinity
    # co-schedules this pod onto the node where the GPUs it monitors live.
    # (hostPath is denied by the cluster's kyverno policy.)
    - name: sgpu-data
      persistentVolumeClaim:
        claimName: pv-01
    # Optional: lets the server list pods (allocated-vs-used view + stats).
    # Create AFTER deploying, no pod restart needed (use the SAME -n you
    # deployed to):
    #   kubectl -n <namespace> create secret generic sgpu-kubeconfig \
    #     --from-file=config=$HOME/.kube/config
    # SECURITY: anyone with exec access to this pod can read that token.
    - name: sgpu-kubeconfig
      secret:
        secretName: sgpu-kubeconfig
        optional: true
  containers:
    - name: monitor
      # Public image (Docker Hub) - no pull secret needed, works on any node.
      # Driver 580.126.16 is pinned inside; bump the tag on every change
      # (never repush a tag: IfNotPresent would keep a node's cached layer).
      image: docker.io/alex6095/sgpu-monitor:0.8.6
      imagePullPolicy: IfNotPresent
      securityContext:
        privileged: true
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "utility"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: KUBECONFIG
          value: /etc/sgpu/kubeconfig/config
        - name: SGPU_DATA_DIR
          value: /var/lib/sgpu
        # 60s: GPU jobs run for hours, so sub-minute sampling was redundant.
        # 1440 samples/day still gives robust util/idle/heatmap stats at
        # ~0.1 MB/day/node gzipped. Per-day interval inference means old 15s
        # data and new 60s data still aggregate correctly together.
        - name: SGPU_SAMPLE_INTERVAL
          value: "60"
        # Lab-wide stats (/stats?scope=lab): every node's monitor, same value
        # everywhere — the server skips the entry matching its own namespace.
        - name: SGPU_PEERS
          value: "node-01=http://sangmin-gpu-monitor.p-sgvr-node-01.svc.cluster.local:8080,node-02=http://sangmin-gpu-monitor.p-sgvr-node-02.svc.cluster.local:8080"
      command:
        - tini
        - --
        - python3
        - /opt/gpu-monitor/server.py
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: sgpu-data
          mountPath: /var/lib/sgpu
          subPath: sangmin/sgpu
        - name: sgpu-kubeconfig
          mountPath: /etc/sgpu/kubeconfig
          readOnly: true
      resources:
        requests:
          cpu: "250m"
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 4Gi
