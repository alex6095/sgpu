apiVersion: v1
kind: Service
metadata:
  name: sangmin-gpu-monitor
  namespace: p-sgvr-node-02
spec:
  selector:
    app: sangmin-gpu-monitor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: sangmin-gpu-monitor
  namespace: p-sgvr-node-02
  labels:
    app: sangmin-gpu-monitor
    owner: sangmin
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  restartPolicy: Always
  priorityClassName: private-zone
  hostPID: true
  imagePullSecrets:
    - name: sangmin-ncr-pull
  nodeSelector:
    mlx.navercorp.com/zone: private-h200-sgvr-0
  containers:
    - name: monitor
      image: vnxb4cz3.kr.private-ncr.ntruss.com/sangmin/gpu-monitor:nvml-580.126.16-v4
      imagePullPolicy: Always
      securityContext:
        privileged: true
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "utility"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      command:
        - tini
        - --
        - python3
        - /opt/gpu-monitor/server.py
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "250m"
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 4Gi
