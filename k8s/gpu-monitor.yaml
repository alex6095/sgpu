apiVersion: v1
kind: Service
metadata:
  name: sangmin-gpu-monitor
  namespace: p-sgvr-node-02
spec:
  selector:
    app: sangmin-gpu-monitor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Pod
metadata:
  name: sangmin-gpu-monitor
  namespace: p-sgvr-node-02
  labels:
    app: sangmin-gpu-monitor
    owner: sangmin
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  restartPolicy: Always
  priorityClassName: private-zone
  hostPID: true
  imagePullSecrets:
    - name: sangmin-ncr-pull
  nodeSelector:
    mlx.navercorp.com/zone: private-h200-sgvr-0
  volumes:
    # Usage-stats storage lives on the lab's shared persistent volume
    # (pv-01), under this user's own subdirectory. subPath keeps the
    # privileged pod scoped to its own stats dir, not the whole 24 TB
    # volume. pv-01 is a node-local (local-path) PV, so its nodeAffinity
    # co-schedules this pod onto the node where the GPUs it monitors live.
    # (hostPath is denied by the cluster's kyverno policy.)
    - name: sgpu-data
      persistentVolumeClaim:
        claimName: pv-01
    # Optional: lets the server list pods (allocated-vs-used view + stats).
    # Create AFTER deploying, no pod restart needed:
    #   kubectl -n p-sgvr-node-02 create secret generic sgpu-kubeconfig \
    #     --from-file=config=$HOME/.kube/config
    # SECURITY: anyone with exec access to this pod can read that token.
    - name: sgpu-kubeconfig
      secret:
        secretName: sgpu-kubeconfig
        optional: true
  containers:
    - name: monitor
      image: vnxb4cz3.kr.private-ncr.ntruss.com/sangmin/gpu-monitor:nvml-580.126.16-v7
      imagePullPolicy: Always
      securityContext:
        privileged: true
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "all"
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: "utility"
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: KUBECONFIG
          value: /etc/sgpu/kubeconfig/config
        - name: SGPU_DATA_DIR
          value: /var/lib/sgpu
        - name: SGPU_SAMPLE_INTERVAL
          value: "15"
      command:
        - tini
        - --
        - python3
        - /opt/gpu-monitor/server.py
      ports:
        - containerPort: 8080
      volumeMounts:
        - name: sgpu-data
          mountPath: /var/lib/sgpu
          subPath: sangmin/sgpu
        - name: sgpu-kubeconfig
          mountPath: /etc/sgpu/kubeconfig
          readOnly: true
      resources:
        requests:
          cpu: "250m"
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 4Gi
